<!-- PWA Manifest -->
<link rel="manifest" href="./manifest.json">

<!-- Theme Color untuk Mobile Browser -->
<meta name="theme-color" content="#6366f1">
<meta name="msapplication-TileColor" content="#6366f1">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="./icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="50x42" href="./icons/icon-50x42.png">
<link rel="apple-touch-icon" sizes="65x60" href="./icons/icon-65x60.png">

<!-- Mobile Web App Capable -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventaris">

<!-- Register Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('SW registered:', registration);
                    
                    // Request background sync permission
                    if ('sync' in registration) {
                        registration.sync.register('sync-inventory');
                    }
                    
                    // Request push notification permission
                    if ('Notification' in window) {
                        Notification.requestPermission();
                    }
                })
                .catch((error) => {
                    console.log('SW registration failed:', error);
                });
        });
    }
</script>
